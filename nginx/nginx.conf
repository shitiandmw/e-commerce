upstream medusa {
    server medusa:9000;
}

upstream admin {
    server admin-ui:3002;
}

upstream storefront {
    server storefront:3000;
}

# Cache zone for Next.js image optimization results
proxy_cache_path /var/cache/nginx/images
    levels=1:2
    keys_zone=images_cache:10m
    max_size=1g
    inactive=7d
    use_temp_path=off;

server {
    listen 80;
    server_name ${ADMIN_DOMAIN};

    location / {
        proxy_pass http://admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name ${API_DOMAIN};

    client_max_body_size 50m;

    location / {
        proxy_pass http://medusa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80 default_server;
    server_name ${STORE_DOMAIN};

    # Cache Next.js image optimization results at nginx level
    location /_next/image {
        proxy_pass http://storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache images_cache;
        proxy_cache_key "$scheme$host$request_uri";
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
