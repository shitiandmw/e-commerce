name: ecommerce-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medusa_password}
      POSTGRES_DB: ${POSTGRES_DB:-medusa_ecommerce}
    ports:
      - "${POSTGRES_PORT:-45432}:5432"
    volumes:
      - ecommerce_prod_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa} -d ${POSTGRES_DB:-medusa_ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce-prod-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-46379}:6379"
    volumes:
      - ecommerce_prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  medusa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-prod-medusa
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD:-medusa_password}@postgres:5432/${POSTGRES_DB:-medusa_ecommerce}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      STORE_CORS: ${STORE_CORS:-http://localhost:43000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:43002}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:43002,http://localhost:43000}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SOCKET_PORT: "9001"
      WIDGET_SOCKET_URL: ${WIDGET_SOCKET_URL:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    ports:
      - "${MEDUSA_PORT:-49000}:9000"
      - "${SOCKET_PORT:-49001}:9001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL_ADMIN: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL_ADMIN:-http://localhost:49000}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:9001}
    container_name: ecommerce-prod-admin-ui
    restart: unless-stopped
    depends_on:
      medusa:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:49001}
    ports:
      - "${ADMIN_PORT:-43002}:3002"

  storefront:
    build:
      context: ./storefront-v2
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL_STORE: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL_STORE:-http://localhost:49000}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:9001}
    container_name: ecommerce-prod-storefront
    restart: unless-stopped
    depends_on:
      medusa:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:49001}
    ports:
      - "${STOREFRONT_PORT:-43000}:3000"

  init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-prod-init
    profiles:
      - init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD:-medusa_password}@postgres:5432/${POSTGRES_DB:-medusa_ecommerce}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo '[init] 创建管理员账号...' &&
        npx medusa user -e $${ADMIN_EMAIL:-admin@test.com} -p $${ADMIN_PASSWORD:-admin123456} 2>&1 | tail -2 &&
        echo '[init] 管理员账号创建完成!'

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-prod-seed
    profiles:
      - seed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD:-medusa_password}@postgres:5432/${POSTGRES_DB:-medusa_ecommerce}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo '[seed] 导入基础种子数据...' &&
        npx medusa exec ./src/scripts/seed.js &&
        echo '[seed] 导入分类数据...' &&
        npx medusa exec ./src/scripts/seed-categories.js &&
        echo '[seed] 导入品牌数据...' &&
        npx medusa exec ./src/scripts/seed-brands.js &&
        echo '[seed] 导入菜单数据...' &&
        npx medusa exec ./src/scripts/seed-menu.js &&
        echo '[seed] 导入 Banner 数据...' &&
        npx medusa exec ./src/scripts/seed-banners.js &&
        echo '[seed] 导入精选集数据...' &&
        npx medusa exec ./src/scripts/seed-collections.js &&
        echo '[seed] 种子数据导入完成!'

  nginx:
    image: nginx:alpine
    container_name: ecommerce-prod-nginx
    restart: unless-stopped
    profiles:
      - with-nginx
    depends_on:
      - medusa
      - admin-ui
      - storefront
    ports:
      - "${NGINX_PORT:-40080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      STORE_DOMAIN: ${STORE_DOMAIN:-store.example.com}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.example.com}
      API_DOMAIN: ${API_DOMAIN:-api.example.com}

volumes:
  ecommerce_prod_pg_data:
  ecommerce_prod_redis_data:
